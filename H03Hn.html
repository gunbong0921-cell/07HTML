<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* #은 아이디선택자로 id가 부여된 엘리먼트를 선택. */
    #mySpan1{
      color: blueviolet;
    }
    /* .은 클래스선택자로 class가 부여된 엘리먼트를 선택. */
    .mySpan2{
      font-weight: bold; font-size: 25px;
    }
  </style>
</head>
<body>
  <!-- 
    Hn태그
    -헤드라인을 표시할때 사용하는 태그
    -블럭엘리먼트(Block Element)로 요소가 세로형으로 배치된다.
    -컨텐츠의 양에 상관없이 무조건 하나의 블럭을 차지한다.
    -h1~6까지 있고, 숫자가 적을수록 텍스트가 크게 표현된다.
  -->
  <h1>블럭 엘리먼트</h1>

  <!-- 
    span태그
    -대표적인 인라인 엘리먼트(Inline Element)로 가로형으로 배치된다.
    -별도의 마크업 기능이 없어 주오 id, class 속성을 부여한 후 css를
    통해 스타일을 부여한다.
  -->
  <span id="mySpan1">인라인 엘리먼트1</span>
  <span class="mySpan2">인라인 엘리먼트2</span>
  <!-- style속성을 통해 가로, 세로 크기를 지정했짐나 적용되자 않는다.
   인라인 엘리먼트는 컨텐츠의 크기만큼만 영역을 차지하는 특징을 가지고
   있기 때문이다. -->
  <span style="border:2px dotted black; width:500px; height:300px; background:yellow;">인라인 엘리먼트3</span>
  <span>인라인 엘리먼트4</span>
  <span>인라인 엘리먼트5</span>

  <hr>
  <!-- 
    border : 박스모델의 테두리의 스타일을 지정하는 속성
      solid : 직선
      dotted : 점선
      double : 이중실전 등이 있다.
    두께나 크기는 px(픽셀) 단위로 지정한다.  
  -->
  <h1 title="title 속성으로 툴팁을 툴력합니다.">제목입니다.</h1>
  <h2>제목2입니다.</h2>
  <h3 style="border:ipx dotted purple;">제목3입니다.</h3>
  <h4 style="text-align:right;">제목4입니다.</h4>
  <h5 style="text-align:center;">제목5입니다.</h5>  
  <h6 style="border:2px double black; width: 500px; height: 300px; 
      background: yellow;">제목6입니다.</h6>
</body>
</html>
