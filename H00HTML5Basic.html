<!-- doctype선언부 : 해당 문서가 HTML임을 선언 -->
<!DOCTYPE html>
<!-- HTML문서의 시작을 알림 -->
<html lang="en">
  <!-- 
    head영역
      : 해당 웹문서의 정보(작성자, 작성도구, 인코딩 등)을
      웹브라우저에게 알려주는 역할을 한다.
      -<meta>, <title> 태그는 반드시 head 영역에 작성해야한다.
      -추가적인 태그로
        <script> : JavaScript를 작성하기 위한 태그
        <style> : CSS3(스타일시트)를 작성하기 위한 태그     
  -->
<head>
  <!-- 해당 HTML 문서의 캐릭터셋(문자셋)을 다국어를 지원하는
   UTF-8로 설정 -->
  <meta charset="UTF-8">
  <!-- 모바일에서 최적화를 위한 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 해당 문서의 타이틀로 웹브라우저의 탭 부분에 노출됨 -->
  <title>HTML5기본</title>
  <script>
    function myFn(param){
      alert('안녕..'+ param);
    }
  </script>
  <style>
    /* 클래스 선택자(selector) : Class */
    .td1{
      color: red;
      font-weight: bold;
    }
    /* 아이디 선택자 : id속성으로 부여된 엘리먼트 선택 */
    #td2{
      background-color: yellow;
      font-style: italic;
    }
    #td3{
      font-style: 30px;
    }
  </style>
</head>
<body>
  <h2>HTML 기본형</h2>
  <!-- 버튼에 oneclick 이벤트 리스너를 이용해서 실행할
   JS함수를 연결한다. -->
  <button onclick="myFn('Hello')">JS함수실행</button>

  <h2>테이블에 CSS 적용하기</h2>
  <table border="1">
    <tr>
      <td class="td1">A</td>
      <td class="td1">B</td>
    </tr>
    <tr>
      <td class="td2">C</td>
      <td class="td3">D</td>
    </tr>
  </table>
</body>
</html>
