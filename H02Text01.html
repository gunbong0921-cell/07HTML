<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 
  hn태그(h1~6) : 텍스트에 헤드라인 효과를 줄때 사용. 텍스트를 
    크고 굵게 표현하는 마크업 효과가 적용된다. 
  -->
  <h2>텍스트 효과주기</h2> 
 
  <!-- HTML 태그 자체를 웹브라우저에 표현하려면 특수 키워드를 사용해야
   한다. <, >와 같은 꺽쇄괄호는 HTML태그로 사용하기 때문이다. -->
  <h3>
    엔터키는 스페이스와 같이 공백으로 인식됩니다. <br>
    줄바꿈을 위해서는 &lt;br&gt; 태그를 사용해야 합니다. 
  </h3>  
 
  <!-- &amp; 는 엠퍼센트 기호를 화면에 출력한다. 또한 스페이스(공백)을
   여러번 사용하더라도 HTML문서에는 한칸만 띄워쓰기된다. 이런 경우에는
   &nbsp;를 여러번 사용해야한다.  -->
  <h4>
    띄어쓰기를 할때는 &amp;nbsp; 를 사용합니다.
    스페이스만으로는 여러칸을 띄울                 수     
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    없어요.
  </h4>
</body>
</html>
