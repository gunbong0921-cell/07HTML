<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5+CSS3+JavaScript</title>
  <style>
    /* body. h2와 같은 태그 자체를 선택(selector)에서 스타일을 지정한다. */
    body{
      background-color: linen; color: blue;
    }
    h2{
      text-align: center; color: darkred;
    }
    hr{
      height: 5px; border: solid gray; background-color: grey;
    }
    span{
      color: red; font-size: 25px;
    }
  </style>
    <!-- 문서에 JavaScript를 선언할때 사용. 텍스트나 이미지와 같은
    정적요소에 동적인 효과를 부여한다. -->
  <script>
    // JavaScript 함수 선언
    function show(){
      // id가 singer인 요소를 선택한 후 src 속서에 이미지를 지정
      document.getElementById('singer').src = './images/ElvisPresley.png';
    }
    function hide(){
      // src 속서에 빈 문자열을 대입하여 이미지를 제거
      document.getElementById('singer').src = '';
    }
  </script>
</head>

<body>
  <!-- 텍스트에 마우스를 올리면 shoe() 함수를 호출하고, 마우스를
   내리면 hide()를 호출해서 이미지를 보잉/숨김 상태로 토글한다. -->
  <h2 onmouseover="show();" onmouseout="hide();">엘비스 프레슬리</h2>  
  <hr>
  <div>
    <!-- 이미지를 문서에 삽입할때 사용하는 태그. 첫 실행에서는
     바나나 이미지가 출력된다. -->
    <img src="./images/banana.png" id="singer">
  </div>
  <!-- stlye 태그 내부에 span 태그선택자를 통해 폰트의 색깔과
   크기를 지정했으므로 좀 더 크게 표시된다. -->
  그는 미국의 가수이자 배우였습니다. <br>
  영화 <span>러브미텐더</span>로 데뷔했습니다.
  그는 <span>"로큰롤의 왕"</span>으로 불립니다.   
</body>
</html>
